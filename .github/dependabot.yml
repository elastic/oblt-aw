version: 2

updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/workflows/*"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "22:00"

  - package-ecosystem: pre-commit
    directory: "/"
    schedule:
      interval: 'weekly'
      day: 'sunday'
      time: '22:00'
    open-pull-requests-limit: 5
    labels:
      - 'changelog:dependencies'
