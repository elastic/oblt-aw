---
name: Security Detector
on:
  workflow_call:

permissions:
  actions: read
  contents: read
  issues: read
  pull-requests: read

jobs:
  scan:
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v6
        with:
          path: target
          fetch-depth: 0

      - name: Checkout oblt-aw (detector scripts)
        uses: actions/checkout@v6
        with:
          repository: elastic/oblt-aw
          ref: main
          path: _oblt-aw

      - name: Install tools
        run: bash _oblt-aw/scripts/install_security_detector_tools.sh

      - name: Set up Node.js (npm audit for SEC-033 when lockfile present)
        if: hashFiles('target/**/package-lock.json') != ''
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run security scan
        id: scan
        run: |
          chmod +x _oblt-aw/scripts/security-scan.sh
          _oblt-aw/scripts/security-scan.sh target 2>/dev/null | tee findings.txt || true
          count=$(grep -cve '^[[:space:]]*$' findings.txt 2>/dev/null || echo 0)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Create issues from findings
        if: ${{ steps.scan.outputs.count != '0' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          SECURITY_SCAN_DATE="$(date -u +%Y-%m-%d)"
          export SECURITY_SCAN_DATE
          chmod +x _oblt-aw/scripts/create-security-issues.sh
          _oblt-aw/scripts/create-security-issues.sh findings.txt
