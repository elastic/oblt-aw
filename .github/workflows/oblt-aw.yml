name: Observability Agentic Workflow Entrypoint

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

permissions:
  actions: read

jobs:
  check-dashboard:
    runs-on: ubuntu-latest
    permissions:
      issues: read
    outputs:
      enabled_workflows: ${{ steps.parse.outputs.enabled_workflows }}
    steps:
      - name: Fetch dashboard issue and parse enabled workflows
        id: parse
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Output must be '' (dashboard absent) or JSON array ([] or ["id",...]).
          # Ingress accepts only these formats; bare workflow IDs are rejected.
          # Use delimiter format to avoid corruption when value contains brackets.
          # https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions#multiline-strings
          DELIM=$(dd if=/dev/urandom bs=15 count=1 status=none | base64 | tr -d '\n')
          write_output() {
            echo "enabled_workflows<<$DELIM" >> "$GITHUB_OUTPUT"
            printf '%s\n' "$1" >> "$GITHUB_OUTPUT"
            echo "$DELIM" >> "$GITHUB_OUTPUT"
          }
          BODY=$(gh api "repos/${{ github.repository }}/issues?labels=oblt-aw/dashboard&state=open" \
            --jq 'if length > 0 then .[0].body else empty end')
          if [[ -z "$BODY" ]]; then
            write_output ""
            echo "No dashboard issue found, defaulting to all workflows enabled"
            exit 0
          fi
          ENABLED=$(echo "$BODY" | grep -oP '(?m)^- \[x\] <!-- oblt-aw:\K[a-z0-9-]+' || true | jq -R -s -c 'split("\n") | map(select(length > 0))')
          if [[ -z "$ENABLED" || "$ENABLED" == "[]" ]]; then
            write_output "[]"
            echo "Dashboard exists but no checkboxes checked, no workflows will run"
          elif [[ "$ENABLED" == "["* ]]; then
            write_output "$ENABLED"
          else
            write_output "[\"$ENABLED\"]"
          fi

  run-aw:
    needs: check-dashboard
    permissions:
      actions: read
      checks: read
      contents: write
      discussions: write
      issues: write
      pull-requests: write
    uses: elastic/oblt-aw/.github/workflows/oblt-aw-ingress.yml@main # ratchet:exclude
    with:
      enabled_workflows: ${{ needs.check-dashboard.outputs.enabled_workflows }}
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
