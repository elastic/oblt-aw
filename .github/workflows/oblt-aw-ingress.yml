name: Observability Agentic Workflow Ingress

# Gating uses effective-raw (no dashboard → '') and enabled-workflows (normalized JSON array).
# Normalization runs in get-enabled-workflows.
on:
  workflow_call:
    secrets:
      COPILOT_GITHUB_TOKEN:
        required: false

permissions:
  actions: write
  checks: read
  contents: write
  discussions: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  dashboard-enabled-workflows:
    uses: ./.github/workflows/get-enabled-workflows.yml

  load-allowed-pr-authors:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/load-allowed-pr-authors.yml

  agent-suggestions:
    needs: dashboard-enabled-workflows
    if: >-
      contains(fromJSON('["schedule"]'), github.event_name) &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:agent-suggestions'))
    uses: ./.github/workflows/gh-aw-agent-suggestions.yml
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

  autodoc:
    needs: dashboard-enabled-workflows
    if: >-
      contains(fromJSON('["schedule"]'), github.event_name) &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:autodoc'))
    uses: ./.github/workflows/gh-aw-autodoc.yml
    secrets: inherit

  automerge:
    needs: [dashboard-enabled-workflows, load-allowed-pr-authors]
    if: >-
      github.event_name == 'pull_request' &&
      contains(fromJSON('["opened","synchronize","reopened","labeled"]'), github.event.action) &&
      contains(fromJSON(needs['load-allowed-pr-authors'].outputs['allowed_pr_authors_json']), github.event.pull_request.user.login) &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'oblt-aw/ai/merge-ready') &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:automerge'))
    uses: ./.github/workflows/gh-aw-automerge.yml
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

  dependency-review:
    needs: [dashboard-enabled-workflows, load-allowed-pr-authors]
    if: >-
      github.event_name == 'pull_request' &&
      contains(fromJSON('["opened","synchronize","reopened"]'), github.event.action) &&
      contains(fromJSON(needs['load-allowed-pr-authors'].outputs['allowed_pr_authors_json']), github.event.pull_request.user.login) &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:dependency-review'))
    uses: ./.github/workflows/gh-aw-dependency-review.yml
    with:
      allowed-bot-users: ${{ needs['load-allowed-pr-authors'].outputs['allowed_pr_authors_csv'] }}
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

  duplicate-issue-detector:
    needs: dashboard-enabled-workflows
    if: >-
      (
        (github.event_name == 'issues' && github.event.action == 'opened') ||
        github.event_name == 'workflow_dispatch'
      ) &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:duplicate-issue-detector'))
    uses: ./.github/workflows/gh-aw-duplicate-issue-detector.yml
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

  issue-triage:
    needs: dashboard-enabled-workflows
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:issue-triage'))
    uses: ./.github/workflows/gh-aw-issue-triage.yml
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

  issue-fixer:
    needs: dashboard-enabled-workflows
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/ai implement') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      !contains(join(github.event.issue.labels.*.name, ','), 'oblt-aw/triage/security-') &&
      !contains(join(github.event.issue.labels.*.name, ','), 'oblt-aw/triage/res-not-accessible-by-integration') &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:issue-fixer'))
    uses: ./.github/workflows/gh-aw-issue-fixer.yml
    secrets: inherit

  mention-in-issue:
    needs: dashboard-enabled-workflows
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/ai') &&
      !startsWith(github.event.comment.body, '/ai implement') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:mention-in-issue'))
    uses: ./.github/workflows/gh-aw-mention-in-issue.yml
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

  resource-not-accessible-by-integration-detector:
    needs: dashboard-enabled-workflows
    if: >-
      contains(fromJSON('["schedule"]'), github.event_name) &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:resource-not-accessible-by-integration'))
    uses: ./.github/workflows/gh-aw-resource-not-accessible-by-integration-detector.yml
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

  resource-not-accessible-by-integration-fixer:
    needs: dashboard-enabled-workflows
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'oblt-aw/ai/fix-ready' &&
      contains(join(github.event.issue.labels.*.name, ','), 'oblt-aw/triage/res-not-accessible-by-integration') &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:resource-not-accessible-by-integration'))
    uses: ./.github/workflows/gh-aw-resource-not-accessible-by-integration-fixer.yml
    secrets: inherit

  resource-not-accessible-by-integration-triage:
    needs: dashboard-enabled-workflows
    if: >-
      github.event_name == 'issues' &&
      (
        (github.event.action == 'opened' && contains(join(github.event.issue.labels.*.name, ','), 'oblt-aw/detector/res-not-accessible-by-integration')) ||
        (github.event.action == 'labeled' && github.event.label.name == 'oblt-aw/detector/res-not-accessible-by-integration')
      ) &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:resource-not-accessible-by-integration'))
    uses: ./.github/workflows/gh-aw-resource-not-accessible-by-integration-triage.yml
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

  security-detector:
    needs: dashboard-enabled-workflows
    if: >-
      contains(fromJSON('["schedule","workflow_dispatch"]'), github.event_name) &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:security'))
    uses: ./.github/workflows/gh-aw-security-detector.yml

  security-fixer:
    needs: dashboard-enabled-workflows
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'oblt-aw/ai/fix-ready' &&
      contains(join(github.event.issue.labels.*.name, ','), 'oblt-aw/triage/security-') &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:security'))
    uses: ./.github/workflows/gh-aw-security-fixer.yml
    secrets: inherit

  security-triage:
    needs: dashboard-enabled-workflows
    if: >-
      github.event_name == 'issues' &&
      (
        (github.event.action == 'opened' && contains(join(github.event.issue.labels.*.name, ','), 'oblt-aw/detector/security')) ||
        (github.event.action == 'labeled' && github.event.label.name == 'oblt-aw/detector/security')
      ) &&
      (needs['dashboard-enabled-workflows'].outputs['effective-raw'] == '' || contains(fromJSON(needs['dashboard-enabled-workflows'].outputs['enabled-workflows']), 'obs:security'))
    uses: ./.github/workflows/gh-aw-security-triage.yml
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

  unsupported-trigger:
    if: >-
      !(
        contains(fromJSON('["schedule","workflow_call"]'), github.event_name) ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issues' && contains(fromJSON('["opened","labeled"]'), github.event.action)) ||
        (github.event_name == 'issue_comment' && github.event.action == 'created') ||
        (github.event_name == 'pull_request' && contains(fromJSON('["opened","synchronize","reopened","labeled"]'), github.event.action))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Unsupported trigger
        run: |
          echo "This entrypoint does not support event '${{ github.event_name }}' with action '${{ github.event.action }}'."
          exit 1
