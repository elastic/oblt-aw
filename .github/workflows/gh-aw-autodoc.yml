name: Automated Documentation Analysis and Improvement
on:
  workflow_call:
    secrets:
      COPILOT_GITHUB_TOKEN:
        required: true

permissions:
  actions: read
  contents: write
  discussions: write
  issues: write
  pull-requests: write

jobs:
  # Step 1: Detect docs drift from recent code changes and create an issue with findings
  audit:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-docs-patrol.lock.yml@main
    with:
      lookback-window: 1 day ago
      title-prefix: "[oblt-aw][autodoc]"
      additional-instructions: |
        Your task is to analyze ALL documentation in this repository, identify gaps and areas for improvement, and file an issue with concrete findings.

        Do NOT search for open issues. Instead, perform a direct documentation audit of this repository.

        **What to look for (in priority order):**
        1. **Undocumented or partially documented code** — features, scripts, workflows, or configuration files that are not covered (or only partially covered) in the repository's documentation; for each gap found, specify which files to add or expand to describe purpose, parameters, behavior, and usage examples
        2. **Empty or missing files** — files that exist but contain no meaningful content
        3. **Missing sections** — key README sections absent such as purpose, usage, inputs, outputs, examples, or contributing guidance
        4. **Outdated content** — references to components, configurations, or capabilities no longer present or not yet documented
        5. **Incomplete descriptions** — sections that exist but lack meaningful detail (stubs, TODOs, placeholder text)
        6. **Broken cross-references** — links to files, workflows, or sections that do not exist in the repository
        7. **Inconsistencies** — documentation that contradicts the actual source files in the repository

        **Issue format:** For each finding, include a clear, actionable checklist of specific documentation changes to make. Each item should reference file paths and describe the change needed.

        **Team notification (mandatory):** Always @mention @elastic/observablt-ci at the top of the issue body so the team receives notifications. Example: "cc @elastic/observablt-ci" or "Notify: @elastic/observablt-ci" at the start of the body.
    secrets: inherit

  # Step 2: Create a PR implementing the audit findings (only when an issue was created)
  fix:
    needs: audit
    if: needs.audit.outputs.created_issue_number != ''
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-create-pr-from-issue.lock.yml@main
    with:
      target-issue-number: ${{ needs.audit.outputs.created_issue_number }}
      draft-prs: true
      additional-instructions: |
        Your task is to implement the documentation improvements described in the issue.

        **Pull Request Requirements:**
        - Title: `docs: Documentation analysis and improvement`
        - Body must include:
          - `Closes #<issue-number>` at the top to link and auto-close the audit issue on merge
          - Summary of files analyzed
          - List of issues found (with file paths and concise descriptions)
          - List of changes made (with rationale for each change)
        - Convert from `Draft` to `Open` (ready for review) only when all changes are implemented and internally consistent.

        **Constraints:**
        - Do not modify source code, workflow logic, scripts, or data files — only documentation files.
        - Do not create new workflow YAML files.
        - Prefer targeted, high-confidence improvements over speculative rewrites.
        - All changes must be grounded in actual repository content — do not invent capability descriptions.
        - Do not add placeholder text or TODOs as improvements.
    secrets: inherit

  # Step 3: Explicitly assign elastic/observablt-ci as reviewer (ensures assignment regardless of agent behaviour)
  request-reviewers:
    needs: fix
    if: needs.fix.outputs.created_pr_number != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request review from elastic/observablt-ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.fix.outputs.created_pr_number }}
        run: gh pr edit "$PR_NUMBER" --add-reviewer "elastic/observablt-ci" --repo "$GITHUB_REPOSITORY"

      - name: Apply changelog:docs label if it exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.fix.outputs.created_pr_number }}
        run: |
          if gh label list --repo "$GITHUB_REPOSITORY" --json name --jq '.[].name' | grep -qx "changelog:docs"; then
            gh pr edit "$PR_NUMBER" --add-label "changelog:docs" --repo "$GITHUB_REPOSITORY"
          fi
