name: Observability Agentic Workflow — Get enabled workflows

# Reads the oblt-aw/dashboard issue and emits normalized outputs for ingress gating (no downstream agentic jobs).
on:
  workflow_call:
    outputs:
      enabled-workflows:
        description: >-
          Normalized JSON array string ([] or ["id", ...]).
          Use effective-raw to distinguish no-dashboard ('') from dashboard with nothing checked.
        value: ${{ jobs['read-dashboard'].outputs['enabled-workflows'] }}
      effective-raw:
        description: >-
          Pre-normalization string from the dashboard read ('', '[]', or '["id",...]');
          empty means no open dashboard issue (ingress enables all workflows).
        value: ${{ jobs['read-dashboard'].outputs['effective-raw'] }}
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  read-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      enabled-workflows: ${{ steps.run.outputs['enabled-workflows'] }}
      effective-raw: ${{ steps.run.outputs['effective-raw'] }}
    steps:
      - name: Checkout oblt-aw (dashboard script)
        uses: actions/checkout@v6
        with:
          repository: elastic/oblt-aw
          ref: main
          path: _oblt-aw

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Fetch dashboard, parse, and normalize enabled workflows
        id: run
        env:
          GH_TOKEN: ${{ github.token }}
        run: python _oblt-aw/scripts/get_enabled_workflows.py
