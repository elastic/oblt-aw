name: Issue Fixer
on:
  workflow_call:

permissions:
  actions: read

jobs:
  run:
    permissions:
      contents: write
      discussions: write
      issues: write
      pull-requests: write
    if: >-
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/ai implement') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      !contains(join(github.event.issue.labels.*.name, ','), 'oblt-aw/triage/security-') &&
      !contains(join(github.event.issue.labels.*.name, ','), 'oblt-aw/triage/res-not-accessible-by-integration')
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-issue-fixer.lock.yml@main
    with:
      additional-instructions: |
        Your task is to fix issues requested through `/ai implement` comments.

        **Execution Preconditions:**
        - Proceed only when the triggering comment starts with `/ai implement` (for example, `/ai implement` or `/ai implement this`).
        - Do not proceed if the issue includes either of these specialized triage labels:
          - `oblt-aw/triage/security-*`
          - `oblt-aw/triage/res-not-accessible-by-integration`
        - The issue must already contain a triage-generated resolution plan.

        **Implementation Workflow (sequential and methodical):**
        1. Read the resolution plan from the issue and extract ordered tasks. Treat this plan as the source of truth.
        2. Execute the plan strictly step by step, without skipping steps.
        3. For each step, document what changed and why in commit messages and PR description.
        4. Run validation/tests described in the plan and confirm the issue is resolved.

        **Pull Request Requirements:**
        - Create a pull request in `Draft` state first.
        - PR title should reference fixing the issue.
        - PR body must include:
          - `Closes #<issue-number>` at the top to link and auto-close the source issue on merge
          - checklist of plan steps completed
          - evidence of successful tests/validation

        **Draft to Open Transition:**
        - Keep PR as `Draft` until all plan steps are fully implemented and validation passes.
        - Once implementation and tests are successful, convert the PR from `Draft` to `Open` (Ready for review).

        **Review Assignment:**
        - Request review from the GitHub team `elastic/observablt-ci`.
        - Wait for approval before any merge action.

        **Merge Policy:**
        - Do not merge automatically.
        - Do not perform merge operations in this workflow.
    secrets: inherit

  request-reviewers:
    needs: run
    if: needs.run.outputs.created_pr_number != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request review from elastic/observablt-ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.run.outputs.created_pr_number }}
        run: gh pr edit "$PR_NUMBER" --add-reviewer "elastic/observablt-ci" --repo "$GITHUB_REPOSITORY"
