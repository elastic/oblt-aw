name: Automerge
on:
  workflow_call:

permissions:
  actions: read
  checks: read
  contents: write
  discussions: write
  issues: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      pr_numbers_json: ${{ steps.discover.outputs.pr_numbers_json }}
      pr_count: ${{ steps.discover.outputs.pr_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Discover qualifying PRs
        id: discover
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('node:fs');
            const path = require('node:path');

            const filePath = path.join(process.env.GITHUB_WORKSPACE, 'scripts/findAutomergeCandidates.ts');
            const source = fs.readFileSync(filePath, 'utf8');

            const moduleShim = { exports: {} };
            const wrapper = new Function(
              'module',
              'exports',
              'require',
              `${source}\nreturn module.exports;`
            );

            const loadedModule = wrapper(moduleShim, moduleShim.exports, require);
            const result = await loadedModule.run({
              github,
              context,
              mergeReadyLabel: 'oblt-aw/ai/merge-ready',
              allowedActor: 'elastic-vault-github-plugin-prod[bot]'
            });

            const prNumbersJson = JSON.stringify(result.prNumbers);
            const prCount = String(result.prNumbers.length);

            core.setOutput('pr_numbers_json', prNumbersJson);
            core.setOutput('pr_count', prCount);

            if (result.prNumbers.length === 0) {
              core.info('No qualifying PRs found.');
            } else {
              core.info(`Found ${result.prNumbers.length} qualifying PR(s): ${result.prNumbers.join(' ')}`);
            }

  approve:
    needs: discover
    if: needs.discover.outputs.pr_count != '0'
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJSON(needs.discover.outputs.pr_numbers_json) }}
    uses: ./.github/workflows/gh-aw-automerge-approve.yml
    with:
      pr-number: ${{ matrix.pr_number }}

  enable-automerge:
    needs:
      - discover
      - approve
    if: needs.discover.outputs.pr_count != '0'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Enable auto-merge for approved PRs
        uses: actions/github-script@v8
        env:
          PR_NUMBERS_JSON: ${{ needs.discover.outputs.pr_numbers_json }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('node:fs');
            const path = require('node:path');

            const filePath = path.join(process.env.GITHUB_WORKSPACE, 'scripts/enableAutomergeForApprovedPrs.ts');
            const source = fs.readFileSync(filePath, 'utf8');

            const moduleShim = { exports: {} };
            const wrapper = new Function(
              'module',
              'exports',
              'require',
              `${source}\nreturn module.exports;`
            );

            const loadedModule = wrapper(moduleShim, moduleShim.exports, require);
            const prNumbers = JSON.parse(process.env.PR_NUMBERS_JSON || '[]');

            await loadedModule.run({
              github,
              context,
              core,
              prNumbers
            });
