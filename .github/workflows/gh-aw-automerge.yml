name: Automerge
on:
  workflow_call:
    inputs:
      allowed-bot-users:
        description: Comma-separated GitHub logins for gh-aw-mention-in-pr (from load-allowed-authors allowed_pr_authors_csv)
        required: true
        type: string
    secrets:
      COPILOT_GITHUB_TOKEN:
        description: "Token for GH-AW mention-in-pr (Copilot); must be supplied by the ingress caller."
        required: true

permissions:
  contents: read

jobs:
  # Single PR from github.event.pull_request. PR fields only (pull_request trigger).
  verify:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
    outputs:
      proceed: ${{ steps.validate.outputs.proceed }}
    steps:
      - name: Checkout elastic/oblt-aw (automerge TypeScript)
        uses: actions/checkout@v6
        with:
          repository: elastic/oblt-aw
          ref: main
          path: _oblt-aw
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: _oblt-aw/package-lock.json

      - name: Install npm dependencies
        working-directory: _oblt-aw
        run: npm ci

      - name: Validate pull request for automerge
        id: validate
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const path = require('node:path');
            const { createRequire } = require('node:module');
            const root = path.join(process.env.GITHUB_WORKSPACE, '_oblt-aw');
            const rq = createRequire(path.join(root, 'package.json'));
            rq('tsx/cjs/api').register();
            const { run } = rq('./scripts/validateAutomergePr.ts');
            const prNumber = parseInt(process.env.PR_NUMBER || '', 10);
            const { ok } = await run({ github, context, prNumber, core });
            core.setOutput('proceed', ok ? 'true' : 'false');

  approve:
    needs: verify
    if: needs.verify.outputs.proceed == 'true'
    permissions:
      actions: read
      contents: write
      discussions: write
      issues: write
      pull-requests: write
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-mention-in-pr.lock.yml@main
    with:
      allowed-bot-users: ${{ inputs.allowed-bot-users }}
      additional-instructions: |
        Target pull request number: ${{ github.event.pull_request.number }}.
      prompt: |
        For pull request #${{ github.event.pull_request.number }}: evaluate automerge eligibility.

        This PR already passed automerge validation in the workflow (GITHUB_TOKEN) for author, label, draft/fork/ref.
        Do not call check-run or commit status APIs. Required checks are enforced by GitHub when auto-merge is enabled.

        Approve the PR only when all of these gates are true:
        - PR author is one of: dependabot[bot], app/dependabot, renovate[bot], app/renovate, Dependabot, Renovate, elastic-vault-github-plugin-prod[bot], app/elastic-vault-github-plugin-prod
        - PR has label `oblt-aw/ai/merge-ready`
        - PR is not draft
        - PR is not from a fork (head repo equals base repo)
        - Head ref is different from base ref

        If any gate is false, do not approve and do not request changes.
        Keep output minimal.
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

  # Same repository as the PR: GITHUB_TOKEN can merge when checks/reviews satisfy branch protection
  # and pascalgn/automerge-action config. Author/label rules are enforced in `verify` (validateAutomergePr).
  automerge:
    needs:
      - verify
      - approve
    if: needs.verify.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    outputs:
      merge_result: ${{ steps.merge-pull-request.outputs.mergeResult }}
    steps:
      - id: merge-pull-request
        name: Merge pull request when ready (squash)
        uses: pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67 # v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
          MERGE_LABELS: "oblt-aw/ai/merge-ready"
          UPDATE_LABELS: "oblt-aw/ai/merge-ready"
          MERGE_METHOD: squash
          MERGE_FORKS: "false"
          MERGE_DELETE_BRANCH: "true"
          MERGE_REQUIRED_APPROVALS: "1"
          MERGE_RETRIES: "10"
          MERGE_RETRY_SLEEP: "20000"

  # pascalgn/automerge-action uses the REST merge API, which branch rules can reject when
  # "merge queue" is required. Enabling native "merge when ready" enqueues the PR instead.
  # Do not pass --delete-branch here: gh rejects it when merge queue is enabled.
  enable-merge-when-ready:
    needs: automerge
    if: always() && needs.automerge.outputs.merge_result == 'merge_failed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
    steps:
      - name: Create ephemeral GitHub token
        id: create-token
        uses: elastic/oblt-actions/github/create-token@v1

      - name: Enable merge when ready (merge queue fallback)
        env:
          GH_TOKEN: ${{ steps.create-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash
