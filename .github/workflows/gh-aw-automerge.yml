name: Automerge
on:
  workflow_call:

permissions:
  actions: read
  checks: read
  contents: write
  discussions: write
  issues: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      pr_numbers_json: ${{ steps.discover.outputs.pr_numbers_json }}
      pr_count: ${{ steps.discover.outputs.pr_count }}
    steps:
      # Caller repo may not contain these scripts; fetch control-plane sources explicitly.
      - name: Checkout elastic/oblt-aw (automerge TypeScript)
        uses: actions/checkout@v6
        with:
          repository: elastic/oblt-aw
          ref: main
          path: _oblt-aw
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: _oblt-aw/package-lock.json

      - name: Install npm dependencies
        working-directory: _oblt-aw
        run: npm ci

      - name: Discover qualifying PRs
        id: discover
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const path = require('node:path');
            const root = path.join(process.env.GITHUB_WORKSPACE, '_oblt-aw');
            require(path.join(root, 'node_modules/tsx/cjs/api')).register();
            const { run } = require(path.join(root, 'scripts/findAutomergeCandidates.ts'));
            const { prNumbers } = await run({
              github,
              context,
              mergeReadyLabel: 'oblt-aw/ai/merge-ready',
              allowedActor: 'elastic-vault-github-plugin-prod[bot]',
            });
            const prNumbersJson = JSON.stringify(prNumbers);
            core.setOutput('pr_numbers_json', prNumbersJson);
            core.setOutput('pr_count', String(prNumbers.length));
            if (prNumbers.length === 0) {
              core.info('No qualifying PRs found.');
            } else {
              core.info(`Found ${prNumbers.length} qualifying PR(s): ${prNumbers.join(' ')}`);
            }

  approve:
    needs: discover
    if: needs.discover.outputs.pr_count != '0'
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJSON(needs.discover.outputs.pr_numbers_json) }}
    uses: ./.github/workflows/gh-aw-automerge-approve.yml
    with:
      pr-number: ${{ matrix.pr_number }}

  enable-automerge:
    needs:
      - discover
      - approve
    if: needs.discover.outputs.pr_count != '0'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout elastic/oblt-aw (automerge TypeScript)
        uses: actions/checkout@v6
        with:
          repository: elastic/oblt-aw
          ref: main
          path: _oblt-aw
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: _oblt-aw/package-lock.json

      - name: Install npm dependencies
        working-directory: _oblt-aw
        run: npm ci

      - name: Enable auto-merge for approved PRs
        uses: actions/github-script@v8
        env:
          PR_NUMBERS_JSON: ${{ needs.discover.outputs.pr_numbers_json }}
        with:
          github-token: ${{ github.token }}
          script: |
            const path = require('node:path');
            const root = path.join(process.env.GITHUB_WORKSPACE, '_oblt-aw');
            require(path.join(root, 'node_modules/tsx/cjs/api')).register();
            const { run } = require(path.join(root, 'scripts/enableAutomergeForApprovedPrs.ts'));
            const prNumbers = JSON.parse(process.env.PR_NUMBERS_JSON || '[]');
            await run({ github, context, core, prNumbers });
