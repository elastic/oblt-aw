name: Automerge
on:
  workflow_call:
    inputs:
      allowed-actor:
        description: "GitHub actor (login) allowed to trigger automerge."
        type: string
        default: "elastic-vault-github-plugin-prod[bot]"
      merge-ready-label:
        description: "Label that marks a PR as ready for automerge."
        type: string
        default: "oblt-aw/ai/merge-ready"
    secrets:
      COPILOT_GITHUB_TOKEN:
        description: "Token for GH-AW mention-in-pr (Copilot); must be supplied by the ingress caller."
        required: true

permissions:
  actions: read
  checks: read
  contents: write
  discussions: write
  issues: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      pr_numbers_json: ${{ steps.discover.outputs.pr_numbers_json }}
      pr_count: ${{ steps.discover.outputs.pr_count }}
    steps:
      # Caller repo may not contain these scripts; fetch control-plane sources explicitly.
      - name: Checkout elastic/oblt-aw (automerge TypeScript)
        uses: actions/checkout@v6
        with:
          repository: elastic/oblt-aw
          ref: main
          path: _oblt-aw
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: _oblt-aw/package-lock.json

      - name: Install npm dependencies
        working-directory: _oblt-aw
        run: npm ci

      - name: Discover qualifying PRs
        id: discover
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const path = require('node:path');
            const { createRequire } = require('node:module');
            const root = path.join(process.env.GITHUB_WORKSPACE, '_oblt-aw');
            const rq = createRequire(path.join(root, 'package.json'));
            rq('tsx/cjs/api').register();
            const { run } = rq('./scripts/findAutomergeCandidates.ts');
            const { prNumbers } = await run({
              github,
              context,
              mergeReadyLabel: '${{ inputs.merge-ready-label }}',
              allowedActor: '${{ inputs.allowed-actor }}',
            });
            const prNumbersJson = JSON.stringify(prNumbers);
            core.setOutput('pr_numbers_json', prNumbersJson);
            core.setOutput('pr_count', String(prNumbers.length));
            if (prNumbers.length === 0) {
              core.info('No qualifying PRs found.');
            } else {
              core.info(`Found ${prNumbers.length} qualifying PR(s): ${prNumbers.join(' ')}`);
            }

  approve:
    needs: discover
    if: needs.discover.outputs.pr_count != '0'
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJSON(needs.discover.outputs.pr_numbers_json) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-mention-in-pr.lock.yml@main
    with:
      additional-instructions: |
        Target pull request number: ${{ matrix.pr_number }}.
      prompt: |
        For pull request #${{ matrix.pr_number }}: evaluate automerge eligibility.

        Approve the PR only when all of these gates are true:
        - PR author is exactly `elastic-vault-github-plugin-prod[bot]`
        - PR has label `${{ inputs.merge-ready-label }}`
        - PR is not draft
        - PR is not from a fork (head repo equals base repo)
        - Head ref is different from base ref
        - All check-runs on the PR head commit are complete and none are failing

        If any gate is false, do not approve and do not request changes.
        Keep output minimal.
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

  enable-automerge:
    needs:
      - discover
      - approve
    if: needs.discover.outputs.pr_count != '0'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout elastic/oblt-aw (automerge TypeScript)
        uses: actions/checkout@v6
        with:
          repository: elastic/oblt-aw
          ref: main
          path: _oblt-aw
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: _oblt-aw/package-lock.json

      - name: Install npm dependencies
        working-directory: _oblt-aw
        run: npm ci

      - name: Enable auto-merge for approved PRs
        uses: actions/github-script@v8
        env:
          PR_NUMBERS_JSON: ${{ needs.discover.outputs.pr_numbers_json }}
        with:
          github-token: ${{ github.token }}
          script: |
            const path = require('node:path');
            const { createRequire } = require('node:module');
            const root = path.join(process.env.GITHUB_WORKSPACE, '_oblt-aw');
            const rq = createRequire(path.join(root, 'package.json'));
            rq('tsx/cjs/api').register();
            const { run } = rq('./scripts/enableAutomergeForApprovedPrs.ts');
            const prNumbers = JSON.parse(process.env.PR_NUMBERS_JSON || '[]');
            await run({ github, context, core, prNumbers });
