name: Automerge
on:
  workflow_call:

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: .github/scripts/automerge/package-lock.json

      - name: Install automerge script dependencies
        working-directory: .github/scripts/automerge
        run: npm ci

      - name: Enable automerge on qualifying PRs
        uses: actions/github-script@v7
        env:
          MERGE_READY_LABEL: "oblt-aw/ai/merge-ready"
          ALLOWED_ACTOR: "elastic-vault-github-plugin-prod[bot]"
        with:
          script: |
            require("ts-node").register({ transpileOnly: true });
            const { run } = require("./.github/scripts/automerge/index.ts");
            await run({ github, context, core });
