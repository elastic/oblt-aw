name: Automerge
on:
  workflow_call:

permissions:
  actions: read
  checks: read
  contents: write
  discussions: write
  issues: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      pr_numbers_json: ${{ steps.discover.outputs.pr_numbers_json }}
      pr_count: ${{ steps.discover.outputs.pr_count }}
    steps:
      - name: Discover qualifying PRs
        id: discover
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const mergeReadyLabel = 'oblt-aw/ai/merge-ready';
            const allowedActor = 'elastic-vault-github-plugin-prod[bot]';

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const qualifying = prs
              .filter((pr) => pr.user?.login === allowedActor)
              .filter((pr) => (pr.labels || []).some((label) => label.name === mergeReadyLabel))
              .filter((pr) => pr.draft === false)
              .filter((pr) => (pr.head?.repo?.full_name || '') === (pr.base?.repo?.full_name || ''))
              .filter((pr) => (pr.head?.ref || '') !== (pr.base?.ref || ''))
              .map((pr) => pr.number);

            const prNumbers = [...new Set(qualifying)].sort((a, b) => a - b);
            const prNumbersJson = JSON.stringify(prNumbers);
            const prCount = String(prNumbers.length);

            core.setOutput('pr_numbers_json', prNumbersJson);
            core.setOutput('pr_count', prCount);

            if (prNumbers.length === 0) {
              core.info('No qualifying PRs found.');
            } else {
              core.info(`Found ${prNumbers.length} qualifying PR(s): ${prNumbers.join(' ')}`);
            }

  approve:
    needs: discover
    if: needs.discover.outputs.pr_count != '0'
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJSON(needs.discover.outputs.pr_numbers_json) }}
    uses: ./.github/workflows/gh-aw-automerge-approve.yml
    with:
      pr-number: ${{ matrix.pr_number }}

  enable-automerge:
    needs:
      - discover
      - approve
    if: needs.discover.outputs.pr_count != '0'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for approved PRs
        uses: actions/github-script@v8
        env:
          PR_NUMBERS_JSON: ${{ needs.discover.outputs.pr_numbers_json }}
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumbers = JSON.parse(process.env.PR_NUMBERS_JSON || '[]');

            if (!Array.isArray(prNumbers) || prNumbers.length === 0) {
              core.info('No PRs provided for auto-merge enablement.');
              return;
            }

            let failed = 0;

            for (const prNumber of prNumbers) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });

              const { data: checkRuns } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: pr.head.sha,
                per_page: 100,
              });

              const all = checkRuns.check_runs || [];
              const total = all.length;
              const completed = all.filter((check) => check.status === 'completed').length;
              const failedCount = all.filter(
                (check) =>
                  check.status === 'completed' &&
                  !['success', 'skipped', 'neutral'].includes(check.conclusion || '')
              ).length;

              let checkStatus = 'passing';
              if (total === 0) {
                checkStatus = 'no_checks';
              } else if (completed < total) {
                checkStatus = 'pending';
              } else if (failedCount > 0) {
                checkStatus = 'failing';
              }

              if (checkStatus !== 'passing') {
                core.info(`PR #${prNumber}: skipped - check status is '${checkStatus}'`);
                continue;
              }

              const { data: reviews } = await github.rest.pulls.listReviews({
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              });

              const approvedByActions = reviews.some(
                (review) => review.state === 'APPROVED' && review.user?.login === 'github-actions[bot]'
              );

              if (!approvedByActions) {
                core.info(`PR #${prNumber}: skipped - no APPROVED review from github-actions[bot]`);
                continue;
              }

              if (pr.auto_merge != null) {
                core.info(`PR #${prNumber}: auto-merge already enabled`);
                continue;
              }

              core.info(`PR #${prNumber}: enabling auto-merge (squash)`);
              try {
                await github.graphql(
                  `mutation EnablePullRequestAutoMerge($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: SQUASH}) {
                      clientMutationId
                    }
                  }`,
                  { pullRequestId: pr.node_id }
                );
                core.info(`PR #${prNumber}: auto-merge enabled`);
              } catch (error) {
                core.warning(`PR #${prNumber}: failed to enable auto-merge`);
                core.warning(String(error));
                failed += 1;
              }
            }

            if (failed > 0) {
              throw new Error(`${failed} PR(s) could not have auto-merge enabled`);
            }
