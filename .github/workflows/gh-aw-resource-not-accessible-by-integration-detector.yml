name: Resource Not Accessible by Integration Detector
on:
  workflow_call:
    inputs:
      target-repositories:
        description: JSON array with allowed repositories. [] allows all repositories.
        required: false
        type: string
        default: "[]"
    secrets:
      COPILOT_GITHUB_TOKEN:
        required: true

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  run:
    if: >-
      fromJSON(inputs.target-repositories)[0] == null ||
      contains(fromJSON(inputs.target-repositories), github.repository)
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-bug-hunter.lock.yml@main
    with:
      additional-instructions: |
        Your task is to detect and report "Resource not accessible by integration" errors/warnings in GitHub Actions workflow execution logs across all branches in this repository.

        **Strict No-Output Rule (MUST be enforced first):**
        - If NO occurrences of the target error are found after completing all detection steps, do NOT create any issue, do NOT post any comment, do NOT send any notification, and do NOT produce any output whatsoever.
        - Silence is the correct and expected outcome when there is nothing to report.
        - This rule is unconditional: do not create "nothing found" issues, "no matches" comments, acknowledgement messages, or any other artifact when there are zero findings.

        **Detection Scope:**
        - Search through all workflow runs (successful, failed, or in-progress) across all branches
        - **Time Range**: Focus on workflow execution logs from the last 24 hours
        - Look for the error message: "Resource not accessible by integration"
        - Check both workflow logs and job step outputs for this error
        - Include warnings and errors related to this message

        **Investigation Steps:**
        1. Use the GitHub API to fetch recent workflow runs for all branches from the last 24 hours
        2. Analyze workflow logs for occurrences of the target error message
        3. Collect context around each error occurrence (before/after log lines)
        4. Identify patterns: which workflows, branches, or steps are most affected

        **Required Information to Collect:**
        For each detected error, gather:
        - **Workflow Name**: The name of the workflow that generated the error
        - **Workflow File**: The path to the workflow YAML file (e.g., `.github/workflows/ci.yml`)
        - **Workflow Run URL**: Direct link to the failed/warning workflow run (format: `https://github.com/{owner}/{repo}/actions/runs/{run_id}`)
        - **Branch Name**: The branch where the workflow was executed
        - **Job Name**: The specific job that encountered the error
        - **Step Name**: The exact step where the error occurred
        - **Timestamp**: When the error occurred
        - **Error Context**: Surrounding log lines showing the full error message and context
        - **Frequency**: How many times this error has occurred recently
        - **Status**: Whether the workflow run failed or completed with warnings

        **Issue Creation Requirements:**
        - Issue title MUST start with: `[AI Detector][Resource not accessible by Integration]`
        - Follow the title prefix with a brief description of the scope (e.g., "Detected in 5 workflows across 3 branches")
        - In the issue body, organize findings by workflow or branch
        - Include markdown tables or lists to present the collected information clearly
        - Add direct links to all affected workflow runs
        - If multiple occurrences are found, group them logically and prioritize by frequency/severity
        - Include recommendations for fixing or investigating further if patterns are identified

        **Example Issue Format:**
        ```
        ## Summary
        Detected {N} occurrences of "Resource not accessible by integration" error across {M} workflows.

        ## Affected Workflows

        ### Workflow: CI
        - **File**: `.github/workflows/ci.yml`
        - **Occurrences**: 3
        - **Branches**: main, develop
        - **Latest Run**: [#12345](workflow-run-url) - 2026-02-27 12:34:56 UTC

        **Error Details:**
        ```
        [error context from logs]
        ```

        [Repeat for each affected workflow]

        ## Recommendations
        [Any patterns or suggestions for resolution]
        ```
      title-prefix: "[AI Detector][Resource not accessible by Integration]"
    secrets: inherit
