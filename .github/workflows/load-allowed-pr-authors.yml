# Checks out elastic/oblt-aw (sparse: allow-list JSON only).
# ref=main matches consumers’ uses: elastic/oblt-aw/.../oblt-aw-ingress.yml@main.
# Ingress gates the call with `if: github.event_name == 'pull_request'` so schedule/issue runs skip checkout.
# Other callers (e.g. workflow_dispatch) can invoke this without that guard.
name: Load allowed PR authors

on:
  workflow_call:
    outputs:
      allowed_pr_authors_json:
        description: Compact JSON array string of allowed GitHub logins for ingress if conditions
        value: ${{ jobs.load.outputs.allowed_pr_authors_json }}
      allowed_pr_authors_csv:
        description: Same logins comma-separated (for allowed-bot-users-style inputs)
        value: ${{ jobs.load.outputs.allowed_pr_authors_csv }}

permissions:
  contents: read

jobs:
  load:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    outputs:
      allowed_pr_authors_json: ${{ steps.pack.outputs.allowed_pr_authors_json }}
      allowed_pr_authors_csv: ${{ steps.pack.outputs.allowed_pr_authors_csv }}
    steps:
      - name: Checkout elastic/oblt-aw (allow-list file only)
        uses: actions/checkout@v6
        with:
          repository: elastic/oblt-aw
          ref: main
          path: _oblt-aw
          fetch-depth: 1
          token: ${{ github.token }}
          sparse-checkout: |
            config/allowed_pr_authors.json
          sparse-checkout-cone-mode: false

      - name: Pack allow list for job output
        id: pack
        run: |
          set -euo pipefail
          FILE="${GITHUB_WORKSPACE}/_oblt-aw/config/allowed_pr_authors.json"
          JSON=$(jq -c . "${FILE}")
          CSV=$(jq -r 'join(",")' "${FILE}")
          echo "allowed_pr_authors_json=$JSON" >> "${GITHUB_OUTPUT}"
          echo "allowed_pr_authors_csv=$CSV" >> "${GITHUB_OUTPUT}"
