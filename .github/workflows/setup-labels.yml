name: Setup Labels

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - active-repositories.json
      - active-labels.json
      - .github/workflows/setup-labels.yml
      - scripts/build_setup_labels_matrix.py
      - scripts/setup_labels.py
      - scripts/summarize_results.py

jobs:
  prepare-repositories:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      repositories: ${{ steps.build-matrix.outputs.repositories }}
      has_repositories: ${{ steps.build-matrix.outputs.has_repositories }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect relevant file changes
        if: ${{ github.event_name == 'push' }}
        id: changed-files
        uses: elastic/oblt-actions/github/changed-files@v1
        with:
          base-ref: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filter: '["*active-repositories.json","*active-labels.json","*.github/workflows/setup-labels.yml","*scripts/build_setup_labels_matrix.py","*scripts/setup_labels.py","*scripts/summarize_results.py"]'

      - name: Build repositories matrix
        id: build-matrix
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python3 scripts/build_setup_labels_matrix.py

      - name: Write setup-labels input summary
        env:
          CHANGED_FILES_COUNT: ${{ steps.changed-files.outputs.count || 'N/A' }}
          HAS_REPOSITORIES: ${{ steps.build-matrix.outputs.has_repositories }}
          REPOSITORIES_JSON: ${{ steps.build-matrix.outputs.repositories }}
        run: |
          {
            echo "## Setup labels input summary"
            echo
            echo "- Relevant changed files: ${CHANGED_FILES_COUNT}"
            echo "- Has repositories to process: ${HAS_REPOSITORIES}"
            echo "- Matrix repositories: ${REPOSITORIES_JSON}"
          } >> "$GITHUB_STEP_SUMMARY"

  setup-labels:
    needs: prepare-repositories
    if: ${{ needs.prepare-repositories.outputs.has_repositories == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        repository: ${{ fromJSON(needs.prepare-repositories.outputs.repositories) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create ephemeral GitHub token
        id: create-token
        uses: elastic/oblt-actions/github/create-token@v1
        with:
          token-policy: token-policy-63405ab45244

      - name: Create required labels in repository
        id: setup-labels
        env:
          GH_TOKEN: ${{ steps.create-token.outputs.token }}
          TARGET_REPOSITORY: ${{ matrix.repository }}
          SETUP_LABELS_REPORT_PATH: setup-labels-report.json
        run: python3 scripts/setup_labels.py

      - name: Upload setup labels report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: setup-label-report-${{ strategy.job-index }}
          path: setup-labels-report.json
          if-no-files-found: ignore

  summarize-setup-labels:
    needs:
      - prepare-repositories
      - setup-labels
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download setup labels report artifacts
        if: ${{ needs.prepare-repositories.outputs.has_repositories == 'true' }}
        uses: actions/download-artifact@v8
        with:
          pattern: setup-label-report-*
          merge-multiple: true
          path: setup-label-results

      - name: Emit setup labels annotation and summary
        env:
          SETUP_LABELS_RESULTS_DIR: setup-label-results
          SETUP_LABELS_HAS_REPOSITORIES: ${{ needs.prepare-repositories.outputs.has_repositories }}
          SETUP_LABELS_JOB_RESULT: ${{ needs.setup-labels.result }}
        run: python3 scripts/summarize_results.py --mode labels
