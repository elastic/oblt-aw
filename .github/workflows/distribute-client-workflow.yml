name: Distribute Client Workflow

on:
  push:
    branches:
      - main
    paths:
      - active-repositories.json
      - .github/remote-workflow-template/oblt-aw.yml

permissions:
  contents: read

concurrency:
  group: distribute-client-workflow
  cancel-in-progress: false

jobs:
  prepare-targets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
      has_targets: ${{ steps.targets.outputs.has_targets }}
      install_count: ${{ steps.targets.outputs.install_count }}
      remove_count: ${{ steps.targets.outputs.remove_count }}
      total_count: ${{ steps.targets.outputs.total_count }}
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect relevant file changes
        id: changed-files
        uses: elastic/oblt-actions/github/changed-files@v1
        with:
          base-ref: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filter: '["*active-repositories.json","*.github/remote-workflow-template/oblt-aw.yml"]'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build target operations matrix
        id: targets
        env:
          CHANGED_FILES_COUNT: ${{ steps.changed-files.outputs.count }}
          BASE_REF: ${{ github.event.before }}
        run: python scripts/build_target_operations.py

      - name: Write target operations summary
        env:
          INSTALL_COUNT: ${{ steps.targets.outputs.install_count }}
          REMOVE_COUNT: ${{ steps.targets.outputs.remove_count }}
          TOTAL_COUNT: ${{ steps.targets.outputs.total_count }}
          CHANGED_FILES_COUNT: ${{ steps.changed-files.outputs.count }}
        run: |
          {
            echo "## Distribution target summary"
            echo
            echo "- Relevant changed files: ${CHANGED_FILES_COUNT}"
            echo "- Install/update targets: ${INSTALL_COUNT}"
            echo "- Removal targets: ${REMOVE_COUNT}"
            echo "- Total target operations: ${TOTAL_COUNT}"
          } >> "$GITHUB_STEP_SUMMARY"

  create-prs:
    needs: prepare-targets
    if: ${{ needs.prepare-targets.outputs.has_targets == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare-targets.outputs.targets) }}
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          path: source

      - name: Create ephemeral GitHub token
        id: create-token
        uses: elastic/oblt-actions/github/create-token@v1
        with:
          token-policy: token-policy-63405ab45244

      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.target.repository }}
          token: ${{ steps.create-token.outputs.token }}
          path: target

      - name: Sync client workflow into target repository
        if: ${{ matrix.target.operation == 'install' }}
        env:
          SOURCE_WORKFLOW_PATH: source/.github/remote-workflow-template/oblt-aw.yml
          TARGET_WORKFLOW_PATH: target/.github/workflows/oblt-aw.yml
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$TARGET_WORKFLOW_PATH")"
          cp "$GITHUB_WORKSPACE/$SOURCE_WORKFLOW_PATH" "$TARGET_WORKFLOW_PATH"

      - name: Remove client workflow from target repository
        if: ${{ matrix.target.operation == 'remove' }}
        env:
          TARGET_WORKFLOW_PATH: target/.github/workflows/oblt-aw.yml
        run: |
          set -euo pipefail

          rm -f "$TARGET_WORKFLOW_PATH"

      - name: Create required labels in target repository
        if: ${{ matrix.target.operation == 'install' }}
        env:
          GH_TOKEN: ${{ steps.create-token.outputs.token }}
          TARGET_REPOSITORY: ${{ matrix.target.repository }}
        run: |
          set -euo pipefail

          gh label create 'triage/resource-not-accessible-by-integration' --repo "$TARGET_REPOSITORY" --color 'd93f0b' --description 'Issue related to Resource not accessible by integration error in GitHub Actions' --force
          gh label create 'triage/other' --repo "$TARGET_REPOSITORY" --color 'e4e669' --description 'Issue triaged as unrelated to known error patterns' --force
          gh label create 'triage/needs-info' --repo "$TARGET_REPOSITORY" --color 'e4e669' --description 'Issue needs more information to be triaged' --force
          gh label create 'ai:fix-ready' --repo "$TARGET_REPOSITORY" --color '0075ca' --description 'Issue has been triaged and is ready for automated fixing' --force
          gh label create 'ai:merge-ready' --repo "$TARGET_REPOSITORY" --color '0075ca' --description 'Pull request dependency review passed with no risk, ready to merge' --force

      - name: Create or update installation PR in target repository
        if: ${{ matrix.target.operation == 'install' }}
        id: cpr
        env:
          JOB_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ steps.create-token.outputs.token }}
          path: target
          branch: oblt-aw/sync-client-workflow
          commit-message: Add Observability Agentic Workflow Entrypoint
          title: Add Observability Agentic Workflow Entrypoint
          body: |
            This PR installs/updates the shared client workflow managed by elastic/oblt-aw.

            - Source: `.github/remote-workflow-template/oblt-aw.yml`
            - Entrypoint: `elastic/oblt-aw/.github/workflows/oblt-aw-ingress.yml@main`

            ---
            Created by [workflow run](${{ env.JOB_URL }})

      - name: Create or update removal PR in target repository
        if: ${{ matrix.target.operation == 'remove' }}
        id: cpr-remove
        env:
          JOB_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ steps.create-token.outputs.token }}
          path: target
          branch: oblt-aw/remove-client-workflow
          commit-message: Remove Observability Agentic Workflow Entrypoint
          title: Remove Observability Agentic Workflow Entrypoint
          body: |
            This PR removes the shared client workflow because the repository is no longer listed in `active-repositories.json`.

            - Removed file: `.github/workflows/oblt-aw.yml`

            ---
            Created by [workflow run](${{ env.JOB_URL }})

      - name: Record PR result
        if: always()
        env:
          TARGET_REPOSITORY: ${{ matrix.target.repository }}
          PULL_REQUEST_URL_INSTALL: ${{ steps.cpr.outputs.pull-request-url }}
          PULL_REQUEST_OPERATION_INSTALL: ${{ steps.cpr.outputs.pull-request-operation }}
          PULL_REQUEST_URL_REMOVE: ${{ steps.cpr-remove.outputs.pull-request-url }}
          PULL_REQUEST_OPERATION_REMOVE: ${{ steps.cpr-remove.outputs.pull-request-operation }}
        run: |
          set -euo pipefail

          if [[ -n "$PULL_REQUEST_URL_INSTALL" ]]; then
            printf '%s|%s|%s\n' "$TARGET_REPOSITORY" "$PULL_REQUEST_OPERATION_INSTALL" "$PULL_REQUEST_URL_INSTALL"
          elif [[ -n "$PULL_REQUEST_URL_REMOVE" ]]; then
            printf '%s|%s|%s\n' "$TARGET_REPOSITORY" "$PULL_REQUEST_OPERATION_REMOVE" "$PULL_REQUEST_URL_REMOVE"
          else
            printf '%s|skipped|-\n' "$TARGET_REPOSITORY"
          fi > pr-result.txt

      - name: Upload PR result artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-result-${{ strategy.job-index }}
          path: pr-result.txt

  summarize:
    needs: create-prs
    if: ${{ always() && needs.create-prs.result != 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6

      - name: Download all PR result artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: pr-result-*
          merge-multiple: true
          path: pr-results

      - name: Emit consolidated annotation and summary
        run: bash scripts/summarize_pr_results.sh
