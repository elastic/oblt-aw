---
name: Duplicate Issue Detector
on:
  workflow_call:
    secrets:
      COPILOT_GITHUB_TOKEN:
        required: true

permissions:
  contents: read
  discussions: write
  issues: write
  pull-requests: read

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-duplicate-issue-detector.lock.yml@v0
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
