---
name: CI

# Trigger on PRs targeting main (opened, updated, reopened).
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

# Avoid workflow-root permissions; define at job scope only.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Run pre-commit
        uses: elastic/oblt-actions/pre-commit@v1
        with:
          python-version: "3.13"

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/*.py', '**/pyproject.toml', '**/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install pytest
        run: pip install pytest==8.3.5

      - name: Run tests
        run: pytest tests/ -v --tb=short

  typescript-tests:
    name: TypeScript tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false

      - name: Upload Scorecard results to GitHub Security
        uses: github/codeql-action/upload-sarif@820e3160e279568db735cee8ed8f8e77a6da7818  # v3.32.6
        with:
          sarif_file: scorecard-results.sarif

  required:
    name: All checks passed
    if: always()
    needs:
      - pre-commit
      - python-tests
      - typescript-tests
      - scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
    steps:
      - name: Check dependent jobs
        id: check
        uses: elastic/oblt-actions/check-dependent-jobs@v1
        with:
          jobs: ${{ toJSON(needs) }}

      - name: Fail if any job failed
        if: steps.check.outputs.status == 'failure'
        run: |
          set -euo pipefail
          echo "One or more required jobs failed."
          exit 1

      - name: All checks passed
        if: steps.check.outputs.status == 'success'
        run: echo "All checks passed."
