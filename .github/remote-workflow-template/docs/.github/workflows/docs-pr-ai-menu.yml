    permissions:
      checks: read
      contents: read
      issues: write
      pull-requests: write
    concurrency:
      group: docs-pr-ai-menu-${{ github.event.issue.number }}
      cancel-in-progress: false

    steps:
      - name: Refresh AI PR menu status
