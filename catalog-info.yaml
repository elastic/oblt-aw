# Declare your Buildkite pipelines below
---
# yaml-language-server: $schema=https://gist.githubusercontent.com/elasticmachine/988b80dae436cafea07d9a4a460a011d/raw/rre.schema.json
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: buildkite-pipeline-oblt-agentic-workflows
  description: Buildkite Pipeline for oblt-agentic-workflows
  links:
    - title: Pipeline
      url: https://buildkite.com/elastic/oblt-agentic-workflows

spec:
  type: buildkite-pipeline
  owner: group:observablt-robots
  system: buildkite
  implementation:
    apiVersion: buildkite.elastic.dev/v1
    kind: Pipeline
    metadata:
      name: oblt-agentic-workflows
      description: Agentic Workflows for Observability
    spec:
      repository: elastic/oblt-agentic-workflows
      pipeline_file: ".buildkite/pipeline.yml"
      provider_settings:
        build_pull_request_forks: true
      teams:
        observablt-robots:
          access_level: MANAGE_BUILD_AND_READ
        everyone:
          access_level: READ_ONLY
